<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Consumption Project — SOC 265</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #F4EFE6; color: #180A00; }
    input, select, button, textarea { font-family: 'DM Sans', sans-serif; }

    :root {
      --bg:   #F4EFE6;  --card: #FEFCF8;
      --pri:  #B35022;  --pli:  #F7E9DE;
      --sec:  #3A6B4A;  --sli:  #DDF0E5;
      --acc:  #C9880E;  --ali:  #FDF3DC;
      --tx:   #180A00;  --mu:   #856B58;
      --bd:   #DDD3C5;
      --warn: #C03318;  --wbg:  #FEECE8;
      --low:  #B87408;  --lbg:  #FEF5E0;
      --r:    10px;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 3px; }

    .card-hover { transition: transform .22s ease, box-shadow .22s ease; cursor: pointer; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 32px rgba(24,10,0,.14) !important; }

    .btn { border: none; cursor: pointer; font-weight: 700; border-radius: 8px;
           transition: opacity .15s, transform .12s; font-family: 'DM Sans', sans-serif; }
    .btn:not(:disabled):hover { opacity: .88; transform: translateY(-1px); }
    .btn:disabled { cursor: default; }

    .inp { border: 1.5px solid var(--bd); border-radius: 8px; padding: 8px 11px;
           font-size: 13px; background: white; color: var(--tx); width: 100%;
           font-family: 'DM Sans', sans-serif; }
    .inp:focus { border-color: var(--pri); outline: none; }

    .slot { cursor: pointer; transition: background .13s, border-color .13s; }
    .slot:hover { background: var(--pli) !important;
                  border-color: var(--pri) !important;
                  border-style: solid !important; }

    .trow:hover td { background: #F8F3EE !important; }

    .result-row { cursor: pointer; transition: background .1s; }
    .result-row:hover { background: var(--pli); }

    .chip-x { border: none; background: none; cursor: pointer; color: var(--mu);
              font-size: 10px; padding: 0 1px; line-height: 1; font-family: 'DM Sans', sans-serif; }
    .chip-x:hover { color: var(--warn); }

    .tab { border: none; cursor: pointer; font-weight: 600; font-size: 13px;
           padding: 6px 14px; border-radius: 7px; transition: all .15s;
           font-family: 'DM Sans', sans-serif; }

    @keyframes fadeUp  { from { opacity:0; transform:translateY(7px); } to { opacity:1; transform:translateY(0); } }
    @keyframes popIn   { from { opacity:0; transform:scale(.94); }      to { opacity:1; transform:scale(1); }     }
    .fade-up { animation: fadeUp .3s ease; }
    .pop-in  { animation: popIn  .2s ease; }

    /* Save indicator */
    .save-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--sec);
                display: inline-block; margin-right: 5px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Constants ─────────────────────────────────────────────────────── */
    const USDA_KEY   = "g7f2cR5bU6fhPm3PcOm6XdXBy6deLQj4cB5QHYhP";
    const DAYS       = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
    const SHORT      = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
    const MEALS      = ["Breakfast","Lunch","Dinner","Snack"];
    const MEAL_ICON  = { Breakfast:"🌅", Lunch:"☀️", Dinner:"🌙", Snack:"🍎" };
    const UNITS      = ["oz","lb","g","kg","each"];
    const BUDGET     = { male: 72.20, female: 57.50 };

    /* FDA Daily Values (2,000 kcal diet) — grouped for display, flat for calculations */
    const NUTRIENT_GROUPS = [
      { label:"Macronutrients", nutrients:[
        { key:"calories", name:"Energy",                       label:"Calories",      unit:"kcal", rda:2000  },
        { key:"protein",  name:"Protein",                      label:"Protein",       unit:"g",    rda:50    },
        { key:"fat",      name:"Total lipid (fat)",            label:"Total Fat",     unit:"g",    rda:78    },
        { key:"carbs",    name:"Carbohydrate, by difference",  label:"Carbohydrates", unit:"g",    rda:275   },
        { key:"fiber",    name:"Fiber, total dietary",         label:"Fiber",         unit:"g",    rda:28    },
        { key:"sodium",   name:"Sodium, Na",                   label:"Sodium",        unit:"mg",   rda:2300  },
      ]},
      { label:"Fat-Soluble Vitamins", nutrients:[
        { key:"vitA", name:"Vitamin A, RAE",                   label:"Vitamin A",     unit:"µg",   rda:900   },
        { key:"vitD", name:"Vitamin D (D2 + D3)",              label:"Vitamin D",     unit:"µg",   rda:20    },
        { key:"vitE", name:"Vitamin E (alpha-tocopherol)",     label:"Vitamin E",     unit:"mg",   rda:15    },
        { key:"vitK", name:"Vitamin K (phylloquinone)",        label:"Vitamin K",     unit:"µg",   rda:120   },
      ]},
      { label:"Water-Soluble Vitamins", nutrients:[
        { key:"vitC",   name:"Vitamin C, total ascorbic acid", label:"Vitamin C",     unit:"mg",   rda:90    },
        { key:"b1",     name:"Thiamin",                        label:"Thiamin (B1)",  unit:"mg",   rda:1.2   },
        { key:"b2",     name:"Riboflavin",                     label:"Riboflavin (B2)",unit:"mg",  rda:1.3   },
        { key:"niacin", name:"Niacin",                         label:"Niacin (B3)",   unit:"mg",   rda:16    },
        { key:"b6",     name:"Vitamin B-6",                    label:"Vitamin B6",    unit:"mg",   rda:1.7   },
        { key:"folate", name:"Folate, DFE",                    label:"Folate",        unit:"µg",   rda:400   },
        { key:"b12",    name:"Vitamin B-12",                   label:"Vitamin B12",   unit:"µg",   rda:2.4   },
      ]},
      { label:"Minerals", nutrients:[
        { key:"calcium",    name:"Calcium, Ca",    label:"Calcium",    unit:"mg",  rda:1300  },
        { key:"iron",       name:"Iron, Fe",       label:"Iron",       unit:"mg",  rda:18    },
        { key:"magnesium",  name:"Magnesium, Mg",  label:"Magnesium",  unit:"mg",  rda:420   },
        { key:"phosphorus", name:"Phosphorus, P",  label:"Phosphorus", unit:"mg",  rda:1250  },
        { key:"potassium",  name:"Potassium, K",   label:"Potassium",  unit:"mg",  rda:4700  },
        { key:"zinc",       name:"Zinc, Zn",       label:"Zinc",       unit:"mg",  rda:11    },
        { key:"selenium",   name:"Selenium, Se",   label:"Selenium",   unit:"µg",  rda:55    },
        { key:"copper",     name:"Copper, Cu",     label:"Copper",     unit:"mg",  rda:0.9   },
        { key:"manganese",  name:"Manganese, Mn",  label:"Manganese",  unit:"mg",  rda:2.3   },
      ]},
    ];
    const NUTRIENTS = NUTRIENT_GROUPS.flatMap(g => g.nutrients);

    /* ── Step 3 display nutrients (12-nutrient focused set) ─────────────── */
    /* The full NUTRIENT_GROUPS (26 nutrients) is retained for export.       */
    /* All 12 keys below exist in NUTRIENT_GROUPS so calcWeeklyNutrients     */
    /* already computes them — no changes to the calculation layer needed.   */
    const STEP3_NUTRIENTS = [
      { key:"calories",  name:"Energy",                         label:"Calories",  unit:"kcal", rda:2000, group:"Macronutrients" },
      { key:"protein",   name:"Protein",                        label:"Protein",   unit:"g",    rda:50,   group:"Macronutrients" },
      { key:"fat",       name:"Total lipid (fat)",              label:"Total Fat", unit:"g",    rda:78,   group:"Macronutrients" },
      { key:"carbs",     name:"Carbohydrate, by difference",    label:"Carbs",     unit:"g",    rda:275,  group:"Macronutrients" },
      { key:"fiber",     name:"Fiber, total dietary",           label:"Fiber",     unit:"g",    rda:28,   group:"Macronutrients" },
      { key:"sodium",    name:"Sodium, Na",                     label:"Sodium",    unit:"mg",   rda:2300, group:"Macronutrients" },
      { key:"iron",      name:"Iron, Fe",                       label:"Iron",      unit:"mg",   rda:18,   group:"Micronutrients" },
      { key:"calcium",   name:"Calcium, Ca",                    label:"Calcium",   unit:"mg",   rda:1300, group:"Micronutrients" },
      { key:"potassium", name:"Potassium, K",                   label:"Potassium", unit:"mg",   rda:4700, group:"Micronutrients" },
      { key:"vitC",      name:"Vitamin C, total ascorbic acid", label:"Vitamin C", unit:"mg",   rda:90,   group:"Micronutrients" },
      { key:"vitD",      name:"Vitamin D (D2 + D3)",            label:"Vitamin D", unit:"µg",   rda:20,   group:"Micronutrients" },
      { key:"folate",    name:"Folate, DFE",                    label:"Folate",    unit:"µg",   rda:400,  group:"Micronutrients" },
    ];

    /* ── Helpers ────────────────────────────────────────────────────────── */
    const initMeals = () =>
      Object.fromEntries(DAYS.map(d => [d, Object.fromEntries(MEALS.map(m => [m, []]))]));

    const toGrams = (qty, unit) =>
      ({ oz:28.3495, lb:453.592, g:1, kg:1000 }[unit] ?? null) * qty;

    const calcServings = (food, qty, unit) => {
      if (!food || !qty || qty <= 0) return 0;
      if (unit === "each") {
        const spc = food.servingsPerContainer;
        return Math.round(qty * (spc > 0 ? spc : 1));
      }
      const g = toGrams(parseFloat(qty), unit);
      if (!g || g <= 0) return 0;
      let sg = 100;
      if (food.servingSize > 0) {
        const u = (food.servingSizeUnit || "g").toLowerCase();
        if (u.startsWith("g"))  sg = food.servingSize;
        else if (u.startsWith("oz")) sg = food.servingSize * 28.3495;
        else sg = food.servingSize;
      }
      return Math.max(1, Math.floor(g / sg));
    };

    const getUsed = (meals, itemId) => {
      let t = 0;
      DAYS.forEach(d => MEALS.forEach(m =>
        (meals[d]?.[m] || []).forEach(e => { if (e.itemId === itemId) t += e.servings; })
      ));
      return t;
    };

    const $$ = n => `$${parseFloat(n || 0).toFixed(2)}`;

    const cleanQuery = q =>
      (q || "").toLowerCase().trim().replace(/[^\w\s]/g, " ").replace(/\s+/g, " ").trim();

    const COMMON_FOODS = [
      "apple","banana","orange","grape","strawberry","blueberry","broccoli","spinach",
      "lettuce","carrot","potato","onion","tomato","pepper","cucumber","rice","pasta",
      "bread","milk","yogurt","cheese","egg","eggs","chicken","chicken breast","ground beef",
      "beans","black beans","peanut butter","oats","cereal","tuna","salmon","frozen vegetables"
    ];

    const STOP_WORDS = new Set(["fresh","organic","large","small","plain","original","store","brand"]);

    const tokenize = str =>
      cleanQuery(str)
        .split(" ")
        .map(t => t.trim())
        .filter(Boolean)
        .filter(t => !STOP_WORDS.has(t));

    const scoreMatch = (query, text) => {
      if (!text) return 0;
      const q = cleanQuery(query);
      const t = cleanQuery(text);
      if (!q || !t) return 0;
      if (t === q) return 140;
      if (t.startsWith(q)) return 120;
      if (t.includes(q)) return 95;

      const qTokens = tokenize(q);
      const tTokens = tokenize(t);
      if (!qTokens.length || !tTokens.length) return 0;

      let score = 0;
      qTokens.forEach(tok => {
        if (tTokens.includes(tok)) score += 28;
        else if (t.includes(tok)) score += 18;
      });

      if (qTokens.length > 1) {
        const overlap = qTokens.filter(tok => tTokens.includes(tok)).length;
        score += overlap * 8;
      }

      return score;
    };

    const isCommonFood = name => {
      const nm = cleanQuery(name);
      return COMMON_FOODS.some(food => nm.includes(food));
    };

    const looksLikeWholeFoodQuery = query => {
      const q = cleanQuery(query);
      return COMMON_FOODS.some(food => q.includes(food)) || tokenize(q).length <= 2;
    };

    const dedupeFoods = foods => {
      const seen = new Set();
      const deduped = [];
      for (const food of foods) {
        const name = cleanQuery(food.description || "");
        const brand = cleanQuery(food.brandName || food.brandOwner || "");
        const key = `${name}__${brand}`;
        if (!name || seen.has(key)) continue;
        seen.add(key);
        deduped.push(food);
      }
      return deduped;
    };

    const normalizeUSDAFood = f => ({
      ...f,
      source: "usda",
      nutrients: f.foodNutrients || f.nutrients || [],
    });

    const filterOFFProduct = p => {
      const name = (p.product_name || p.product_name_en || "").trim();
      if (!name) return false;
      const nutriments = p.nutriments || {};
      const hasCoreNutrition = ["energy-kcal_100g","proteins_100g","fat_100g","carbohydrates_100g"]
        .some(key => nutriments[key] != null);
      return hasCoreNutrition || !!p.brands;
    };

    /* Normalize an Open Food Facts product into the same shape as a USDA food */
    const normalizeOFF = p => {
      const nm = p.nutriments || {};
      // OFF stores nutrients per 100g; serving_quantity is grams per serving
      const sg = parseFloat(p.serving_quantity) || 100;
      const n100 = key => (nm[key + "_100g"] != null ? nm[key + "_100g"] : null);
      return {
        fdcId:               "off_" + (p.id || p.code || Math.random()),
        description:         (p.product_name || p.product_name_en || "").trim(),
        brandName:           p.brands ? p.brands.split(",")[0].trim() : "",
        servingSize:         sg,
        servingSizeUnit:     "g",
        servingsPerContainer: null,
        dataType:            "Open Food Facts",
        source:              "off",
        foodNutrients: [
          { nutrientName:"Energy",                     value: n100("energy-kcal"), unitName:"kcal" },
          { nutrientName:"Protein",                    value: n100("proteins"),    unitName:"g"    },
          { nutrientName:"Total lipid (fat)",          value: n100("fat"),         unitName:"g"    },
          { nutrientName:"Carbohydrate, by difference",value: n100("carbohydrates"),unitName:"g"  },
          { nutrientName:"Fiber, total dietary",       value: n100("fiber"),       unitName:"g"    },
          /* OFF sodium is g/100g → convert to mg */
          { nutrientName:"Sodium, Na", unitName:"mg",
            value: n100("sodium") != null ? Math.round(n100("sodium") * 1000) : null },
        ].filter(n => n.value != null),
      };
    };

    const loadSaved = () => {
      try {
        const raw = localStorage.getItem("fcp_plans");
        if (!raw) return null;
        const p = JSON.parse(raw);
        return {
          thrifty:   { items: p.thrifty?.items   || [], meals: p.thrifty?.meals   || initMeals() },
          preferred: { items: p.preferred?.items || [], meals: p.preferred?.meals || initMeals() },
        };
      } catch { return null; }
    };

    /* ── Nutrient helpers ───────────────────────────────────────────────── */
    /* USDA branded foods report nutrients PER SERVING; SR Legacy / Foundation
       and Open Food Facts report PER 100 g. normalizeOFF already tags source="off"
       and dataType="Open Food Facts", so we only need to check dataType here.    */
    const getNutrientPerServing = (item, nutrientName) => {
      const nut = (item.nutrients || []).find(n => n.nutrientName === nutrientName);
      if (!nut || nut.value == null) return null;
      if (item.dataType === "Branded Food") return nut.value; // already per serving
      const sg = item.servingSize || 100;                     // grams per serving
      return (nut.value * sg) / 100;
    };

    const calcWeeklyNutrients = (items, meals) => {
      // Pre-filter to assigned items so we can track totalAssigned per nutrient entry.
      // totalAssigned = items that appear in any meal slot; used for "X of Y items" coverage notes.
      const assigned = items.filter(it => getUsed(meals, it.id) > 0);
      const totalAssigned = assigned.length;
      const totals = Object.fromEntries(
        NUTRIENTS.map(n => [n.key, { total: 0, itemsWithData: 0, totalAssigned }])
      );
      assigned.forEach(item => {
        const used = getUsed(meals, item.id);
        NUTRIENTS.forEach(n => {
          const perServing = getNutrientPerServing(item, n.name);
          if (perServing != null) {
            totals[n.key].total        += perServing * used;
            totals[n.key].itemsWithData += 1;
          }
        });
      });
      return totals;
    };

    /* ── Export helpers ─────────────────────────────────────────────────── */
    const escCSV = v => `"${String(v ?? "").replace(/"/g, '""')}"`;
    const rowToCSV = r => r.map(escCSV).join(",");

    const buildShoppingRows = items => {
      const header = ["Food Item","Brand","Qty Purchased","Unit","Total Servings","Price ($)","Cost/Serving ($)"];
      const rows   = items.map(it => [
        it.name, it.brandName || "", it.purchasedQty, it.purchasedUnit,
        it.totalServings, parseFloat(it.price).toFixed(2),
        parseFloat(it.costPerServing).toFixed(2),
      ]);
      const total = items.reduce((s,i) => s + i.price, 0);
      return [header, ...rows, ["TOTAL","","","","",total.toFixed(2),""]];
    };

    const buildMealRows = (items, meals) => {
      const header = ["Day","Breakfast","Lunch","Dinner","Snack"];
      return [header, ...DAYS.map(day => [
        day,
        ...MEALS.map(meal =>
          (meals[day]?.[meal] || [])
            .map(e => { const it = items.find(i => i.id === e.itemId); return it ? `${it.name.split(",")[0]} x${e.servings}` : ""; })
            .filter(Boolean).join("; ") || ""
        ),
      ])];
    };

    const buildNutritionRows = plans => {
      const tNut = calcWeeklyNutrients(plans.thrifty.items,   plans.thrifty.meals);
      const pNut = calcWeeklyNutrients(plans.preferred.items, plans.preferred.meals);
      const fmt  = v => v < 0.1 ? v.toFixed(3) : v < 10 ? v.toFixed(2) : v < 100 ? v.toFixed(1) : Math.round(v).toString();
      const header = ["Group","Nutrient","Unit","RDA",
        "Thrifty - Daily Avg","Thrifty - % of RDA",
        "Preferred - Daily Avg","Preferred - % of RDA"];
      const rows = [];
      NUTRIENT_GROUPS.forEach(group => {
        group.nutrients.forEach(n => {
          const tVal = tNut[n.key].total / 7, tHas = tNut[n.key].itemsWithData > 0;
          const pVal = pNut[n.key].total / 7, pHas = pNut[n.key].itemsWithData > 0;
          rows.push([
            group.label, n.label, n.unit, n.rda,
            tHas ? fmt(tVal)                       : "No data",
            tHas ? (tVal/n.rda*100).toFixed(1)+"%" : "No data",
            pHas ? fmt(pVal)                       : "No data",
            pHas ? (pVal/n.rda*100).toFixed(1)+"%" : "No data",
          ]);
        });
      });
      return [header, ...rows];
    };

    function PlanSelect({ onSelect, hasSaved }) {
      return (
        <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column",
          alignItems:"center",justifyContent:"center",padding:32}}>
          <div style={{textAlign:"center",marginBottom:48,maxWidth:560}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:"3px",color:"var(--pri)",
              textTransform:"uppercase",marginBottom:14}}>SOC 265 · Food and Society</div>
            <h1 style={{fontFamily:"'Lora',serif",fontSize:38,fontWeight:700,color:"var(--tx)",
              lineHeight:1.2,marginBottom:14}}>Food Consumption<br/>Project</h1>
            <p style={{color:"var(--mu)",fontSize:15,lineHeight:1.7,maxWidth:400,margin:"0 auto"}}>
              Build two weekly meal plans — one budget-constrained, one unrestricted.
            </p>
            {hasSaved && (
              <div style={{marginTop:16,display:"inline-flex",alignItems:"center",background:"var(--sli)",
                color:"var(--sec)",borderRadius:8,padding:"7px 14px",fontSize:13,fontWeight:600}}>
                <span className="save-dot" />
                Your previous work has been saved and will load automatically.
              </div>
            )}
          </div>
          <div style={{display:"flex",gap:24,flexWrap:"wrap",justifyContent:"center"}}>
            {[
              { id:"thrifty",  icon:"🧾", title:"Thrifty Plan",   sub:"USDA Budget-Constrained",
                desc:"Build meals within the USDA Thrifty Food Plan weekly spending limits. A live tracker monitors your budget.",
                c:"var(--pri)", bg:"var(--pli)", border:"#E8C9B4" },
              { id:"preferred",icon:"✨", title:"Preferred Plan",  sub:"No Budget Limit",
                desc:"Build your ideal week of meals with no spending ceiling. Reflects your real food preferences and habits.",
                c:"var(--sec)", bg:"var(--sli)", border:"#AACDB8" },
            ].map(p => (
              <div key={p.id} className="card-hover" onClick={() => onSelect(p.id)}
                style={{background:"var(--card)",border:`2px solid ${p.border}`,borderRadius:16,
                  padding:"36px 28px",width:272,textAlign:"center",
                  boxShadow:"0 4px 20px rgba(24,10,0,.07)"}}>
                <div style={{fontSize:44,marginBottom:16}}>{p.icon}</div>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:"2px",color:p.c,
                  textTransform:"uppercase",marginBottom:6}}>{p.sub}</div>
                <h2 style={{fontFamily:"'Lora',serif",fontSize:22,fontWeight:700,
                  color:"var(--tx)",marginBottom:12}}>{p.title}</h2>
                <p style={{color:"var(--mu)",fontSize:13,lineHeight:1.65,marginBottom:24}}>{p.desc}</p>
                <div style={{background:p.bg,color:p.c,borderRadius:8,padding:"10px 0",
                  fontWeight:700,fontSize:14}}>Start Building →</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ── Budget Setup ───────────────────────────────────────────────────── */
    function BudgetSetup({ sex, setSex, onConfirm }) {
      return (
        <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",
          alignItems:"center",justifyContent:"center",padding:32}}>
          <div className="fade-up" style={{background:"var(--card)",borderRadius:16,padding:"44px 40px",
            maxWidth:420,width:"100%",boxShadow:"0 6px 32px rgba(24,10,0,.1)",textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:16}}>🧾</div>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:"2px",color:"var(--pri)",
              textTransform:"uppercase",marginBottom:8}}>Thrifty Food Plan</div>
            <h2 style={{fontFamily:"'Lora',serif",fontSize:26,fontWeight:700,
              marginBottom:10,color:"var(--tx)"}}>Set Your Weekly Budget</h2>
            <p style={{color:"var(--mu)",fontSize:14,lineHeight:1.65,marginBottom:28}}>
              The USDA Thrifty Food Plan (February 2026) sets weekly spending limits
              by sex for adults aged 20–50. Select yours below.
            </p>
            <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:24}}>
              {[{v:"male",l:"Male",a:72.20},{v:"female",l:"Female",a:57.50}].map(o => (
                <div key={o.v} onClick={() => setSex(o.v)}
                  style={{flex:1,padding:"16px 12px",borderRadius:10,cursor:"pointer",
                    border:`2px solid ${sex===o.v?"var(--pri)":"var(--bd)"}`,
                    background:sex===o.v?"var(--pli)":"white",transition:"all .15s"}}>
                  <div style={{fontWeight:700,fontSize:15,color:"var(--tx)",marginBottom:4}}>{o.l}</div>
                  <div style={{fontFamily:"'Lora',serif",fontSize:26,fontWeight:700,color:"var(--pri)"}}>${o.a.toFixed(2)}</div>
                  <div style={{fontSize:12,color:"var(--mu)",marginTop:2}}>per week</div>
                </div>
              ))}
            </div>
            <div style={{background:"var(--ali)",border:"1px solid #EDD8A0",borderRadius:8,
              padding:"11px 14px",marginBottom:24,fontSize:13,color:"#7A5600"}}>
              <strong>Your limit: {$$(BUDGET[sex])}/week</strong> · Ages 20–50 · February 2026 USDA rates
            </div>
            <button className="btn" onClick={onConfirm}
              style={{background:"var(--pri)",color:"white",padding:"12px 0",fontSize:15,width:"100%"}}>
              Start Shopping →
            </button>
          </div>
        </div>
      );
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    function Header({ activePlan, activeStep, setActiveStep, totalSpent, budgetLimit, overBudget, onSwitch, onReset, onExport }) {
      const pct  = budgetLimit ? Math.min(100, (totalSpent / budgetLimit) * 100) : 0;
      const barC = overBudget ? "var(--warn)" : pct > 85 ? "var(--acc)" : "var(--sec)";
      return (
        <div style={{background:"var(--card)",borderBottom:"1px solid var(--bd)",padding:"0 20px",
          position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 10px rgba(24,10,0,.06)"}}>
          <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",gap:10,height:58}}>
            <span style={{fontSize:18,marginRight:2}}>🍽</span>
            <span style={{fontFamily:"'Lora',serif",fontWeight:700,fontSize:16,color:"var(--tx)"}}>FoodTracker</span>
            <div onClick={onSwitch}
              style={{cursor:"pointer",background:activePlan==="thrifty"?"var(--pli)":"var(--sli)",
                color:activePlan==="thrifty"?"var(--pri)":"var(--sec)",
                borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:700,marginLeft:4}}>
              {activePlan==="thrifty"?"🧾 Thrifty":"✨ Preferred"} ▾
            </div>
            <div style={{display:"flex",gap:2,marginLeft:10}}>
              {[{n:1,l:"Shopping List"},{n:2,l:"Meal Planner"},{n:3,l:"Nutrition"}].map(s => (
                <button key={s.n} className="tab" onClick={() => setActiveStep(s.n)}
                  style={{background:activeStep===s.n?"var(--pri)":"transparent",
                    color:activeStep===s.n?"white":"var(--mu)"}}>
                  <span style={{opacity:.65,marginRight:3}}>{s.n}.</span>{s.l}
                </button>
              ))}
            </div>
            <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
              {overBudget && (
                <div style={{background:"var(--wbg)",color:"var(--warn)",borderRadius:6,
                  padding:"3px 9px",fontSize:12,fontWeight:700}}>⚠ Over Budget</div>
              )}
              {budgetLimit ? (
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:12,color:"var(--mu)",marginBottom:2}}>
                    {$$(totalSpent)} / {$$(budgetLimit)}
                  </div>
                  <div style={{height:5,borderRadius:3,background:"var(--bd)",width:148,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,background:barC,
                      borderRadius:3,transition:"width .3s"}} />
                  </div>
                </div>
              ) : (
                <div style={{fontSize:13,color:"var(--mu)"}}>
                  Total: <strong style={{color:"var(--tx)"}}>{$$(totalSpent)}</strong>
                </div>
              )}
              <div style={{display:"flex",alignItems:"center",fontSize:11,color:"var(--mu)",
                marginLeft:4}} title="Your work saves automatically">
                <span className="save-dot" />saved
              </div>
              <button className="btn" onClick={onExport}
                title="Export to CSV or Excel"
                style={{background:"var(--sli)",color:"var(--sec)",padding:"5px 10px",
                  fontSize:12,border:"1px solid #AACDB8"}}>
                ⬇ Export
              </button>
              <button className="btn" onClick={onReset}
                title="Reset plan data"
                style={{background:"var(--wbg)",color:"var(--warn)",padding:"5px 10px",
                  fontSize:12,border:"1px solid #F0B8A8"}}>
                ↺ Reset
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ── Step 1: Shopping List ───────────────────────────────────────────── */
    function Step1({ activePlan, items, totalSpent, budgetLimit, overBudget, goToStep2,
      searchQuery, setSearchQuery, searchResults, searching, showDropdown, setShowDropdown,
      selectedFood, setSelectedFood, selectFood,
      qty, setQty, unit, setUnit, price, setPrice, addToList, removeItem, addManualItem }) {

      const dropRef = useRef(null);

      // ── Manual entry form state ──────────────────────────────────────────
      const [showManual, setShowManual] = useState(false);
      const BLANK_FORM = { name:"", brand:"", url:"", servingSize:"", servingsPerContainer:"",
                           calories:"", protein:"", fat:"", carbs:"", fiber:"", sodium:"",
                           qty:"", unit:"oz", price:"" };
      const [mForm, setMForm] = useState(BLANK_FORM);
      const setM = (field, val) => setMForm(f => ({ ...f, [field]: val }));

      // Servings-per-container is required only when unit is "each" (see calcServings logic).
      const manualCanAdd = !!(
        mForm.name.trim() &&
        parseFloat(mForm.servingSize) > 0 &&
        parseFloat(mForm.qty) > 0 &&
        parseFloat(mForm.price) > 0 &&
        (mForm.unit !== "each" || parseFloat(mForm.servingsPerContainer) > 0)
      );

      const submitManual = () => {
        if (!manualCanAdd) return;
        addManualItem({ ...mForm });
        setMForm(BLANK_FORM);
        setShowManual(false);
      };
      useEffect(() => {
        const h = e => { if (dropRef.current && !dropRef.current.contains(e.target)) setShowDropdown(false); };
        document.addEventListener("mousedown", h);
        return () => document.removeEventListener("mousedown", h);
      }, []);

      const est  = selectedFood && parseFloat(qty) > 0 ? calcServings(selectedFood, parseFloat(qty), unit) : null;
      const cpp  = est && parseFloat(price) > 0 ? (parseFloat(price)/est).toFixed(2) : null;
      const canAdd = !!(selectedFood && parseFloat(qty) > 0 && parseFloat(price) > 0);

      return (
        <div className="fade-up" style={{display:"grid",gridTemplateColumns:"310px 1fr",gap:20}}>
          {/* Left: Add Panel */}
          <div style={{background:"var(--card)",borderRadius:"var(--r)",padding:22,
            boxShadow:"0 2px 12px rgba(24,10,0,.07)",border:"1px solid var(--bd)"}}>

            {/* Mode toggle */}
            <div style={{display:"flex",gap:4,background:"#EDE7DC",borderRadius:9,padding:3,marginBottom:18}}>
              {[{v:false,l:"🔍 Search"},{v:true,l:"✏️ Enter Manually"}].map(o => (
                <button key={String(o.v)} className="tab"
                  onClick={() => setShowManual(o.v)}
                  style={{flex:1,background:showManual===o.v?"var(--card)":"transparent",
                    color:showManual===o.v?"var(--tx)":"var(--mu)",
                    boxShadow:showManual===o.v?"0 1px 4px rgba(24,10,0,.1)":"none",
                    fontSize:12}}>
                  {o.l}
                </button>
              ))}
            </div>

            {!showManual ? (
              /* ── Search mode ── */
              <div>
                <h2 style={{fontFamily:"'Lora',serif",fontSize:18,fontWeight:700,marginBottom:4,color:"var(--tx)"}}>
                  Add Food Item
                </h2>
                <p style={{fontSize:12,color:"var(--mu)",marginBottom:18}}>
                  Search for generic foods or branded products. Generic foods have better nutrient data.
                </p>

                {/* Search */}
                <div ref={dropRef} style={{position:"relative",marginBottom:12}}>
                  <label style={{fontSize:11,fontWeight:700,color:"var(--mu)",display:"block",
                    marginBottom:4,textTransform:"uppercase",letterSpacing:".5px"}}>Search Food</label>
                  <div style={{position:"relative"}}>
                    <input className="inp" value={searchQuery}
                      onChange={e => { setSearchQuery(e.target.value); if (!e.target.value) setSelectedFood(null); }}
                      onFocus={() => searchResults.length > 0 && setShowDropdown(true)}
                      placeholder="e.g. 'whole milk' or 'Cheerios'"
                      style={{paddingRight:32}} />
                    <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
                      fontSize:14,pointerEvents:"none"}}>{searching?"⏳":"🔍"}</span>
                  </div>

                  {/* Tiered dropdown */}
                  {showDropdown && searchResults.length > 0 && (
                    <div style={{position:"absolute",top:"calc(100% + 3px)",left:0,right:0,background:"white",
                      border:"1.5px solid var(--bd)",borderRadius:8,
                      boxShadow:"0 4px 22px rgba(24,10,0,.12)",zIndex:200,maxHeight:300,overflowY:"auto"}}>
                      {(() => {
                        // Group consecutive items by tier for visual dividers
                        const groups = searchResults.reduce((acc, food) => {
                          const last = acc[acc.length - 1];
                          if (!last || last.tier !== food.tier) acc.push({ tier: food.tier, foods: [food] });
                          else last.foods.push(food);
                          return acc;
                        }, []);
                        const hasGeneric = searchResults.some(f => f.tier === "generic");
                        const TIER_META = {
                          generic: { icon:"🌿", label:"Generic Foods",    sub:"complete nutrient data",   badgeColor:"#2A5F3A", badgeBg:"#D5EDDF" },
                          branded: { icon:"🏷️",  label:"Branded Products", sub:"USDA database",            badgeColor:"#8A6040", badgeBg:"#F4EFE6" },
                          off:     { icon:"📦", label:"Open Food Facts",  sub:"packaged products",         badgeColor:"#2A6B3A", badgeBg:"#DDF0E5" },
                        };
                        return (
                          <>
                            {groups.map((group, gi) => {
                              const tm = TIER_META[group.tier] || { icon:"🔍", label:group.tier, sub:"", badgeColor:"#888", badgeBg:"#EEE" };
                              return (
                                <div key={group.tier}>
                                  <div style={{padding:"5px 12px 4px",background:"#F5F0E8",
                                    borderTop: gi > 0 ? "1px solid var(--bd)" : "none",
                                    display:"flex",alignItems:"baseline",gap:6}}>
                                    <span style={{fontSize:10,fontWeight:700,textTransform:"uppercase",
                                      letterSpacing:"1px",color:"var(--mu)"}}>{tm.icon} {tm.label}</span>
                                    <span style={{fontSize:10,color:"#AFA090",fontStyle:"italic"}}>{tm.sub}</span>
                                  </div>
                                  {group.foods.map(food => (
                                    <div key={food.fdcId} className="result-row" onClick={() => selectFood(food)}
                                      style={{padding:"9px 12px",borderBottom:"1px solid #F0EAE0"}}>
                                      <div style={{fontSize:13,fontWeight:600,color:"var(--tx)",lineHeight:1.3}}>
                                        {food.description}
                                      </div>
                                      <div style={{display:"flex",gap:8,marginTop:2,flexWrap:"wrap",alignItems:"center"}}>
                                        {(food.brandName||food.brandOwner) &&
                                          <span style={{fontSize:11,color:"var(--pri)",fontWeight:500}}>
                                            {food.brandName||food.brandOwner}
                                          </span>}
                                        {food.servingSize &&
                                          <span style={{fontSize:11,color:"var(--mu)"}}>
                                            Serving: {food.servingSize} {food.servingSizeUnit}
                                          </span>}
                                        <span style={{fontSize:10,color:tm.badgeColor,background:tm.badgeBg,
                                          borderRadius:3,padding:"1px 5px"}}>
                                          {tm.icon} {food.dataType || group.tier}
                                        </span>
                                      </div>
                                    </div>
                                  ))}
                                </div>
                              );
                            })}
                            {/* No-generic-match tip */}
                            {!hasGeneric && (
                              <div style={{padding:"8px 12px",background:"var(--ali)",
                                borderTop:"1px solid #EDD8A0",fontSize:11,color:"#7A5600",lineHeight:1.55}}>
                                💡 No generic match found — for better nutrient data, try a simpler
                                search term like <em>"bread"</em> or <em>"whole milk."</em>
                              </div>
                            )}
                          </>
                        );
                      })()}
                    </div>
                  )}
                </div>

                {/* Selected food */}
                {selectedFood && (
                  <div style={{background:"var(--pli)",border:"1px solid #E8C9B4",borderRadius:8,
                    padding:"9px 11px",marginBottom:12,fontSize:12}}>
                    <div style={{fontWeight:700,color:"var(--pri)",marginBottom:2}}>✓ Selected</div>
                    <div style={{fontWeight:600,color:"var(--tx)",lineHeight:1.4}}>{selectedFood.description}</div>
                    {(selectedFood.brandName||selectedFood.brandOwner) &&
                      <div style={{color:"var(--mu)"}}>{selectedFood.brandName||selectedFood.brandOwner}</div>}
                    {selectedFood.servingSize &&
                      <div style={{color:"var(--mu)"}}>Serving: {selectedFood.servingSize} {selectedFood.servingSizeUnit}</div>}
                  </div>
                )}

                {/* Qty + Unit */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"var(--mu)",display:"block",
                      marginBottom:4,textTransform:"uppercase",letterSpacing:".5px"}}>Quantity</label>
                    <input className="inp" type="number" min="0" step="any" value={qty}
                      onChange={e => setQty(e.target.value)} placeholder="e.g. 16" />
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"var(--mu)",display:"block",
                      marginBottom:4,textTransform:"uppercase",letterSpacing:".5px"}}>Unit</label>
                    <select className="inp" value={unit} onChange={e => setUnit(e.target.value)}>
                      {UNITS.map(u => <option key={u}>{u}</option>)}
                    </select>
                  </div>
                </div>

                {/* Price */}
                <div style={{marginBottom:14}}>
                  <label style={{fontSize:11,fontWeight:700,color:"var(--mu)",display:"block",
                    marginBottom:4,textTransform:"uppercase",letterSpacing:".5px"}}>Price Paid ($)</label>
                  <input className="inp" type="number" min="0" step="0.01" value={price}
                    onChange={e => setPrice(e.target.value)} placeholder="e.g. 3.49" />
                </div>

                {/* Preview */}
                {est > 0 && (
                  <div style={{background:"#F0EBE0",borderRadius:8,padding:"12px 10px",marginBottom:14,
                    display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,textAlign:"center"}}>
                    <div>
                      <div style={{fontFamily:"'Lora',serif",fontSize:26,fontWeight:700,color:"var(--tx)"}}>{est}</div>
                      <div style={{fontSize:10,color:"var(--mu)",fontWeight:700,
                        textTransform:"uppercase",letterSpacing:".5px"}}>Servings</div>
                    </div>
                    {cpp && (
                      <div style={{borderLeft:"1px solid var(--bd)"}}>
                        <div style={{fontFamily:"'Lora',serif",fontSize:26,fontWeight:700,color:"var(--sec)"}}>${cpp}</div>
                        <div style={{fontSize:10,color:"var(--mu)",fontWeight:700,
                          textTransform:"uppercase",letterSpacing:".5px"}}>Per Serving</div>
                      </div>
                    )}
                  </div>
                )}

                <button className="btn" onClick={addToList} disabled={!canAdd}
                  style={{background:canAdd?"var(--pri)":"var(--bd)",
                    color:canAdd?"white":"var(--mu)",padding:"11px 0",
                    fontSize:14,width:"100%",opacity:canAdd?1:.7}}>
                  + Add to Shopping List
                </button>
              </div>
            ) : (
              /* ── Manual entry mode ── */
              <div>
                <h2 style={{fontFamily:"'Lora',serif",fontSize:18,fontWeight:700,marginBottom:4,color:"var(--tx)"}}>
                  Enter from Label
                </h2>
                <p style={{fontSize:12,color:"var(--mu)",marginBottom:14,lineHeight:1.6}}>
                  Can't find your product? Enter nutrition facts from the package label.
                </p>

                {/* Product info */}
                <div style={{marginBottom:8}}>
                  <label style={{fontSize:11,fontWeight:700,color:"var(--mu)",display:"block",
                    marginBottom:4,textTransform:"uppercase",letterSpacing:".5px"}}>Product Name *</label>
                  <input className="inp" value={mForm.name}
                    onChange={e => setM("name", e.target.value)} placeholder="e.g. Great Value Whole Milk" />
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"var(--mu)",display:"block",
                      marginBottom:4,textTransform:"uppercase",letterSpacing:".5px"}}>Brand</label>
                    <input className="inp" value={mForm.brand}
                      onChange={e => setM("brand", e.target.value)} placeholder="optional" />
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"var(--mu)",display:"block",
                      marginBottom:4,textTransform:"uppercase",letterSpacing:".5px"}}>Serving Size (g) *</label>
                    <input className="inp" type="number" min="0" step="any" value={mForm.servingSize}
                      onChange={e => setM("servingSize", e.target.value)} placeholder="e.g. 240" />
                  </div>
                </div>
                <div style={{marginBottom:8}}>
                  <label style={{fontSize:11,fontWeight:700,color:"var(--mu)",display:"block",
                    marginBottom:4,textTransform:"uppercase",letterSpacing:".5px"}}>
                    Servings per Container{mForm.unit === "each" ? " *" : ""}
                  </label>
                  <input className="inp" type="number" min="0" step="any" value={mForm.servingsPerContainer}
                    onChange={e => setM("servingsPerContainer", e.target.value)}
                    placeholder={mForm.unit==="each" ? "required for 'each' unit" : "e.g. 8 (optional)"} />
                  {mForm.unit === "each" && !parseFloat(mForm.servingsPerContainer) && (
                    <div style={{fontSize:11,color:"var(--warn)",marginTop:3}}>Required when unit is "each"</div>
                  )}
                </div>
                <div style={{marginBottom:12}}>
                  <label style={{fontSize:11,fontWeight:700,color:"var(--mu)",display:"block",
                    marginBottom:4,textTransform:"uppercase",letterSpacing:".5px"}}>
                    Product URL <span style={{fontWeight:400,textTransform:"none"}}>(optional — saved for reference, not fetched)</span>
                  </label>
                  <input className="inp" value={mForm.url}
                    onChange={e => setM("url", e.target.value)} placeholder="e.g. walmart.com/ip/..." />
                </div>

                {/* Nutrition per serving */}
                <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",
                  color:"var(--mu)",marginBottom:6,paddingTop:8,borderTop:"1px solid var(--bd)"}}>
                  Nutrition Facts (per serving)
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
                  {[
                    { label:"Calories (kcal)", field:"calories", placeholder:"e.g. 150" },
                    { label:"Protein (g)",     field:"protein",  placeholder:"e.g. 8"   },
                    { label:"Total Fat (g)",   field:"fat",      placeholder:"e.g. 8"   },
                    { label:"Carbs (g)",       field:"carbs",    placeholder:"e.g. 12"  },
                    { label:"Fiber (g)",       field:"fiber",    placeholder:"e.g. 0"   },
                    { label:"Sodium (mg)",     field:"sodium",   placeholder:"e.g. 120" },
                  ].map(({ label, field, placeholder }) => (
                    <div key={field}>
                      <label style={{fontSize:10,fontWeight:700,color:"var(--mu)",display:"block",
                        marginBottom:3,textTransform:"uppercase",letterSpacing:".3px"}}>{label}</label>
                      <input className="inp" type="number" min="0" step="any"
                        value={mForm[field]} onChange={e => setM(field, e.target.value)}
                        placeholder={placeholder} style={{fontSize:12}} />
                    </div>
                  ))}
                </div>

                {/* Purchase fields */}
                <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",
                  color:"var(--mu)",marginBottom:6,paddingTop:8,borderTop:"1px solid var(--bd)"}}>
                  Purchase Details
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"var(--mu)",display:"block",
                      marginBottom:4,textTransform:"uppercase",letterSpacing:".5px"}}>Quantity *</label>
                    <input className="inp" type="number" min="0" step="any" value={mForm.qty}
                      onChange={e => setM("qty", e.target.value)} placeholder="e.g. 1" />
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"var(--mu)",display:"block",
                      marginBottom:4,textTransform:"uppercase",letterSpacing:".5px"}}>Unit *</label>
                    <select className="inp" value={mForm.unit} onChange={e => setM("unit", e.target.value)}>
                      {UNITS.map(u => <option key={u}>{u}</option>)}
                    </select>
                  </div>
                </div>
                <div style={{marginBottom:14}}>
                  <label style={{fontSize:11,fontWeight:700,color:"var(--mu)",display:"block",
                    marginBottom:4,textTransform:"uppercase",letterSpacing:".5px"}}>Price Paid ($) *</label>
                  <input className="inp" type="number" min="0" step="0.01" value={mForm.price}
                    onChange={e => setM("price", e.target.value)} placeholder="e.g. 3.49" />
                </div>

                <button className="btn" onClick={submitManual} disabled={!manualCanAdd}
                  style={{background:manualCanAdd?"#4A6FA5":"var(--bd)",
                    color:manualCanAdd?"white":"var(--mu)",padding:"11px 0",
                    fontSize:14,width:"100%",opacity:manualCanAdd?1:.7}}>
                  ✏️ Add to Shopping List
                </button>
              </div>
            )}
          </div>

          {/* Right: List */}
          <div>
            {/* Budget bar */}
            {budgetLimit && (
              <div style={{background:overBudget?"var(--wbg)":"var(--card)",
                border:`1px solid ${overBudget?"#F0B8A8":"var(--bd)"}`,
                borderRadius:"var(--r)",padding:"14px 18px",marginBottom:16,
                boxShadow:"0 2px 10px rgba(24,10,0,.06)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span style={{fontWeight:700,fontSize:14,color:overBudget?"var(--warn)":"var(--tx)"}}>
                    {overBudget?"⚠️ Over Budget":"📊 Weekly Budget Tracker"}
                  </span>
                  <span>
                    <span style={{fontFamily:"'Lora',serif",fontSize:18,fontWeight:700,
                      color:overBudget?"var(--warn)":"var(--tx)"}}>{$$(totalSpent)}</span>
                    <span style={{fontSize:13,color:"var(--mu)"}}> / {$$(budgetLimit)}</span>
                  </span>
                </div>
                <div style={{height:6,borderRadius:3,background:"var(--bd)",overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:3,transition:"width .3s",
                    width:`${Math.min(100,totalSpent/budgetLimit*100)}%`,
                    background:overBudget?"var(--warn)":totalSpent/budgetLimit>.85?"var(--acc)":"var(--sec)"}} />
                </div>
                {overBudget && (
                  <div style={{fontSize:12,color:"var(--warn)",marginTop:6}}>
                    {$$(totalSpent-budgetLimit)} over limit — consider removing some items.
                  </div>
                )}
              </div>
            )}

            {/* Shopping list */}
            <div style={{background:"var(--card)",borderRadius:"var(--r)",
              boxShadow:"0 2px 12px rgba(24,10,0,.07)",border:"1px solid var(--bd)",overflow:"hidden"}}>
              <div style={{padding:"13px 18px",borderBottom:"1px solid var(--bd)",
                display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <h2 style={{fontFamily:"'Lora',serif",fontSize:18,fontWeight:700,color:"var(--tx)"}}>
                  Shopping List
                </h2>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{background:"var(--pli)",color:"var(--pri)",borderRadius:6,
                    padding:"3px 9px",fontSize:12,fontWeight:700}}>
                    {items.length} item{items.length!==1?"s":""}
                  </span>
                  {items.length > 0 && (
                    <button className="btn" onClick={goToStep2}
                      style={{background:"var(--sec)",color:"white",padding:"5px 12px",fontSize:12}}>
                      Plan Meals →
                    </button>
                  )}
                </div>
              </div>

              {items.length === 0 ? (
                <div style={{padding:"48px 20px",textAlign:"center",color:"var(--mu)"}}>
                  <div style={{fontSize:36,marginBottom:10}}>🛒</div>
                  <div style={{fontWeight:700,marginBottom:4,fontSize:15}}>Your list is empty</div>
                  <div style={{fontSize:13}}>Search for foods on the left and add them here.</div>
                </div>
              ) : (
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                    <thead>
                      <tr style={{background:"#F5F0E8"}}>
                        {["Food Item","Purchased","Servings","Price","Cost / Serving",""].map((h,i) => (
                          <th key={i} style={{padding:"9px 14px",textAlign:i>=2?"center":"left",
                            fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:".5px",
                            color:"var(--mu)",borderBottom:"1px solid var(--bd)",whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {items.map(item => (
                        <tr key={item.id} className="trow" style={{borderBottom:"1px solid var(--bd)"}}>
                          <td style={{padding:"11px 14px",maxWidth:220}}>
                            <div style={{fontWeight:600,color:"var(--tx)",lineHeight:1.3}}>{item.name}</div>
                            {item.brandName && <div style={{fontSize:11,color:"var(--pri)",marginTop:1}}>{item.brandName}</div>}
                            <div style={{fontSize:11,color:"var(--mu)",marginTop:1}}>
                              Serving: {item.servingSize} {item.servingSizeUnit}
                            </div>
                            {item.source === "manual" && (
                              <span style={{fontSize:10,color:"#4A6FA5",background:"#E8EEF7",
                                borderRadius:3,padding:"1px 5px",display:"inline-block",marginTop:2}}>
                                ✏️ Manual Entry
                              </span>
                            )}
                          </td>
                          <td style={{padding:"11px 14px",color:"var(--tx)",whiteSpace:"nowrap"}}>
                            {item.purchasedQty} {item.purchasedUnit}
                          </td>
                          <td style={{padding:"11px 14px",textAlign:"center"}}>
                            <span style={{background:"var(--sli)",color:"var(--sec)",borderRadius:5,
                              padding:"2px 8px",fontWeight:700,fontSize:13}}>{item.totalServings}</span>
                          </td>
                          <td style={{padding:"11px 14px",textAlign:"center",fontWeight:700,color:"var(--tx)"}}>
                            {$$(item.price)}
                          </td>
                          <td style={{padding:"11px 14px",textAlign:"center",color:"var(--mu)"}}>
                            {$$(item.costPerServing)}
                          </td>
                          <td style={{padding:"11px 14px",textAlign:"center"}}>
                            <button className="btn" onClick={() => removeItem(item.id)}
                              style={{background:"var(--wbg)",color:"var(--warn)",padding:"4px 9px",fontSize:12}}>✕</button>
                          </td>

                      ))}
                    </tbody>
                    <tfoot>
                      <tr style={{background:"#F5F0E8",borderTop:"2px solid var(--bd)"}}>
                        <td colSpan={3} style={{padding:"9px 14px",fontWeight:700,color:"var(--tx)"}}>Total</td>
                        <td style={{padding:"9px 14px",textAlign:"center",fontFamily:"'Lora',serif",
                          fontSize:17,fontWeight:700,color:"var(--tx)"}}>{$$(totalSpent)}</td>
                        <td colSpan={2}/>
                      </tr>
                    </tfoot>
                  </table>
                </div>
              )}
            </div>
          </div>
        </div>
      );
