    /* ── Step 2: Meal Planner ────────────────────────────────────────────── */
    function Step2({ items, meals, selectedSlot, setSelectedSlot,
      pickerItemId, setPickerItemId, pickerServings, setPickerServings,
      assignMeal, removeFromSlot }) {

      const byId  = id => items.find(i => i.id === id);
      const remOf = id => { const it = byId(id); return it ? it.totalServings - getUsed(meals, id) : 0; };
      const pickerRem = pickerItemId ? remOf(pickerItemId) : 0;

      return (
        <div className="fade-up" style={{display:"flex",gap:20,alignItems:"flex-start"}}>
          {/* Meal grid */}
          <div style={{flex:1,minWidth:0}}>
            <div style={{background:"var(--card)",borderRadius:"var(--r)",
              boxShadow:"0 2px 12px rgba(24,10,0,.07)",border:"1px solid var(--bd)",overflow:"hidden"}}>
              <div style={{padding:"13px 18px",borderBottom:"1px solid var(--bd)"}}>
                <h2 style={{fontFamily:"'Lora',serif",fontSize:18,fontWeight:700,color:"var(--tx)"}}>
                  7-Day Meal Planner
                </h2>
                <p style={{fontSize:12,color:"var(--mu)",marginTop:2}}>
                  Click any slot to assign food items. Inventory updates in real time.
                </p>
              </div>
              {items.length === 0 ? (
                <div style={{padding:"48px 20px",textAlign:"center",color:"var(--mu)"}}>
                  <div style={{fontSize:36,marginBottom:10}}>📅</div>
                  <div style={{fontWeight:700,marginBottom:4}}>No items in your shopping list</div>
                  <div style={{fontSize:13}}>Go to Step 1 to add food items first.</div>
                </div>
              ) : (
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",minWidth:600}}>
                    <thead>
                      <tr style={{background:"#F5F0E8"}}>
                        <th style={{padding:"9px 12px",fontWeight:700,fontSize:11,textTransform:"uppercase",
                          letterSpacing:".5px",color:"var(--mu)",borderBottom:"1px solid var(--bd)",
                          width:74,textAlign:"left"}}>Day</th>
                        {MEALS.map(m => (
                          <th key={m} style={{padding:"9px 12px",fontWeight:700,fontSize:11,
                            textTransform:"uppercase",letterSpacing:".5px",color:"var(--mu)",
                            borderBottom:"1px solid var(--bd)",textAlign:"left"}}>
                            {MEAL_ICON[m]} {m}
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {DAYS.map((day, di) => (
                        <tr key={day} style={{borderBottom:"1px solid var(--bd)",
                          background:di%2===0?"white":"#FDFAF5"}}>
                          <td style={{padding:"10px 12px",fontWeight:700,fontSize:12,
                            color:"var(--tx)",whiteSpace:"nowrap",verticalAlign:"top"}}>
                            <div>{SHORT[di]}</div>
                            <div style={{fontSize:10,fontWeight:400,color:"var(--mu)"}}>{day.slice(3)}</div>
                          </td>
                          {MEALS.map(meal => {
                            const entries = meals[day]?.[meal] || [];
                            const isSel   = selectedSlot?.day===day && selectedSlot?.meal===meal;
                            return (
                              <td key={meal} style={{padding:5,verticalAlign:"top"}}>
                                <div className="slot"
                                  onClick={() => { setSelectedSlot({day,meal}); setPickerItemId(""); setPickerServings(1); }}
                                  style={{minHeight:52,border:`1.5px ${isSel?"solid var(--pri)":"dashed var(--bd)"}`,
                                    borderRadius:6,padding:5,background:isSel?"var(--pli)":"transparent"}}>
                                  {entries.length === 0 &&
                                    <div style={{fontSize:11,color:"var(--bd)",textAlign:"center",
                                      paddingTop:10,userSelect:"none"}}>+</div>}
                                  {entries.map(entry => {
                                    const it = byId(entry.itemId);
                                    if (!it) return null;
                                    const nm = it.name.split(",")[0].substring(0,16);
                                    return (
                                      <span key={entry.itemId}
                                        title={`${it.name} · ${entry.servings} serving${entry.servings!==1?"s":""}`}
                                        style={{display:"inline-flex",alignItems:"center",gap:2,
                                          background:"var(--sli)",color:"var(--sec)",
                                          borderRadius:4,fontSize:10,padding:"2px 4px",
                                          margin:"1px",fontWeight:600,maxWidth:130}}>
                                        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                                          {nm}
                                        </span>
                                        <span style={{opacity:.7}}>×{entry.servings}</span>
                                        <button className="chip-x"
                                          onClick={e => { e.stopPropagation(); removeFromSlot(day,meal,entry.itemId); }}>✕</button>
                                      </span>
                                    );
                                  })}
                                </div>
                              </td>
                            );
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </div>

          {/* Inventory panel */}
          <div style={{width:230,flexShrink:0}}>
            <div style={{background:"var(--card)",borderRadius:"var(--r)",
              boxShadow:"0 2px 12px rgba(24,10,0,.07)",border:"1px solid var(--bd)",
              overflow:"hidden",position:"sticky",top:74}}>
              <div style={{padding:"11px 14px",borderBottom:"1px solid var(--bd)",background:"#F5F0E8"}}>
                <div style={{fontFamily:"'Lora',serif",fontSize:15,fontWeight:700,color:"var(--tx)"}}>Inventory</div>
                <div style={{fontSize:11,color:"var(--mu)",marginTop:1}}>Remaining servings</div>
              </div>
              {items.length === 0 ? (
                <div style={{padding:14,textAlign:"center",color:"var(--mu)",fontSize:12}}>No items</div>
              ) : (
                <div style={{maxHeight:"calc(100vh - 210px)",overflowY:"auto"}}>
                  {items.map(item => {
                    const used  = getUsed(meals, item.id);
                    const rem   = item.totalServings - used;
                    const pct   = item.totalServings > 0 ? (rem / item.totalServings) * 100 : 0;
                    const empty = rem <= 0, low = pct <= 30 && !empty;
                    return (
                      <div key={item.id} style={{padding:"9px 12px",borderBottom:"1px solid var(--bd)",
                        background:empty?"var(--wbg)":low?"var(--lbg)":"white",transition:"background .3s"}}>
                        <div style={{display:"flex",justifyContent:"space-between",
                          alignItems:"flex-start",gap:4,marginBottom:5}}>
                          <div style={{fontSize:11,fontWeight:600,lineHeight:1.3,flex:1,
                            overflow:"hidden",color:empty?"var(--warn)":"var(--tx)"}}>
                            {item.name.split(",")[0].substring(0,24)}
                            {item.name.split(",")[0].length>24?"…":""}
                          </div>
                          <div style={{fontSize:11,fontWeight:700,whiteSpace:"nowrap",
                            color:empty?"var(--warn)":low?"var(--low)":"var(--sec)"}}>
                            {rem}/{item.totalServings}
                          </div>
                        </div>
                        <div style={{height:5,borderRadius:3,background:"var(--bd)",overflow:"hidden"}}>
                          <div style={{height:"100%",borderRadius:3,transition:"width .3s",
                            width:`${Math.max(0,pct)}%`,
                            background:empty?"var(--warn)":low?"var(--acc)":"var(--sec)"}} />
                        </div>
                        <div style={{fontSize:10,color:"var(--mu)",marginTop:3}}>
                          {empty?"❌ Exhausted":low?"⚠ Running low":`${used} of ${item.totalServings} used`}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>

          {/* Food picker modal */}
          {selectedSlot && items.length > 0 && (
            <div onClick={() => setSelectedSlot(null)}
              style={{position:"fixed",inset:0,background:"rgba(24,10,0,.45)",
                zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
              <div className="pop-in" onClick={e => e.stopPropagation()}
                style={{background:"var(--card)",borderRadius:14,padding:26,
                  width:"100%",maxWidth:360,boxShadow:"0 8px 40px rgba(24,10,0,.2)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
                  <div>
                    <div style={{fontFamily:"'Lora',serif",fontSize:17,fontWeight:700,color:"var(--tx)"}}>
                      {MEAL_ICON[selectedSlot.meal]} {selectedSlot.meal}
                    </div>
                    <div style={{fontSize:12,color:"var(--mu)",marginTop:1}}>{selectedSlot.day}</div>
                  </div>
                  <button className="btn" onClick={() => setSelectedSlot(null)}
                    style={{background:"var(--bd)",color:"var(--mu)",padding:"4px 10px",fontSize:13}}>✕</button>
                </div>

                <div style={{marginBottom:12}}>
                  <label style={{fontSize:11,fontWeight:700,color:"var(--mu)",display:"block",
                    marginBottom:4,textTransform:"uppercase",letterSpacing:".5px"}}>Select Food</label>
                  <select className="inp" value={pickerItemId}
                    onChange={e => { setPickerItemId(e.target.value); setPickerServings(1); }}>
                    <option value="">— Choose an item —</option>
                    {items.map(it => {
                      const r = remOf(it.id);
                      return (
                        <option key={it.id} value={it.id} disabled={r<=0}>
                          {it.name.substring(0,40)}{r<=0?" (exhausted)":` (${r} left)`}
                        </option>
                      );
                    })}
                  </select>
                </div>

                {pickerItemId && pickerRem > 0 && (
                  <div style={{marginBottom:12}}>
                    <label style={{fontSize:11,fontWeight:700,color:"var(--mu)",display:"block",
                      marginBottom:4,textTransform:"uppercase",letterSpacing:".5px"}}>Servings</label>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <button className="btn" onClick={() => setPickerServings(Math.max(1, pickerServings-1))}
                        style={{background:"var(--bd)",color:"var(--tx)",width:36,height:36,
                          fontSize:18,fontWeight:700,flexShrink:0}}>−</button>
                      <input type="number" min="1" max={pickerRem} value={pickerServings}
                        onChange={e => setPickerServings(Math.max(1,Math.min(pickerRem,parseInt(e.target.value)||1)))}
                        className="inp" style={{textAlign:"center",fontWeight:700,fontSize:16}} />
                      <button className="btn" onClick={() => setPickerServings(Math.min(pickerRem, pickerServings+1))}
                        style={{background:"var(--bd)",color:"var(--tx)",width:36,height:36,
                          fontSize:18,fontWeight:700,flexShrink:0}}>+</button>
                    </div>
                    <div style={{fontSize:11,color:"var(--mu)",marginTop:4,textAlign:"center"}}>
                      {pickerRem} serving{pickerRem!==1?"s":""} available
                    </div>
                  </div>
                )}

                {pickerItemId && pickerRem <= 0 && (
                  <div style={{background:"var(--wbg)",color:"var(--warn)",borderRadius:8,
                    padding:"9px 11px",marginBottom:12,fontSize:13,fontWeight:500}}>
                    All servings used. Remove an assignment or choose a different item.
                  </div>
                )}

                <button className="btn" onClick={assignMeal}
                  disabled={!pickerItemId || pickerRem <= 0 || pickerServings <= 0}
                  style={{background:(!pickerItemId||pickerRem<=0)?"var(--bd)":"var(--pri)",
                    color:(!pickerItemId||pickerRem<=0)?"var(--mu)":"white",
                    padding:"11px 0",fontSize:14,width:"100%",
                    opacity:(!pickerItemId||pickerRem<=0)?.7:1}}>
                  Add to {selectedSlot.meal}
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ── Step 3: Nutritional Summary ────────────────────────────────────── */
    function Step3({ plans, sex, lookupNutrients }) {
      const [view,       setView]       = useState("daily");
      const [lookingUp,  setLookingUp]  = useState(new Set());

      const divisor = view === "daily" ? 7 : 1;

      // Only show plans that have assigned meal data
      const activePlanKeys = ["thrifty","preferred"].filter(planKey => {
        const plan = plans[planKey];
        return plan.items.some(it => getUsed(plan.meals, it.id) > 0);
      });

      const hasAnyData = activePlanKeys.length > 0;

      // Build data objects for each active plan
      const planData = activePlanKeys.map(planKey => {
        const plan      = plans[planKey];
        const assigned  = plan.items.filter(it => getUsed(plan.meals, it.id) > 0);
        const nutrients = calcWeeklyNutrients(plan.items, plan.meals);
        const totalSpent  = plan.items.reduce((s,i) => s + i.price, 0);
        const budgetLimit = planKey === "thrifty" ? BUDGET[sex] : null;
        return { planKey, plan, assigned, nutrients, totalSpent, budgetLimit };
      });

      // ── Helpers ────────────────────────────────────────────────────────

      // Format a nutrient value for display
      const fmtVal = v =>
        v == null ? "" :
        v < 0.1   ? v.toFixed(3) :
        v < 10    ? v.toFixed(1) :
        v < 1000  ? v.toFixed(1) :
        Math.round(v).toLocaleString();

      // Resolve a nutrient's display data from the weekly totals
      const getDisplay = (nutrients, key) => {
        const d = nutrients[key];
        if (!d) return { value:null, hasData:false, partial:false, coverage:"" };
        const { total, itemsWithData, totalAssigned } = d;
        const hasData = itemsWithData > 0;
        const val     = hasData ? total / divisor : null;
        const partial = hasData && itemsWithData < totalAssigned;
        const coverage = partial
          ? `${itemsWithData} of ${totalAssigned} items`
          : (!hasData && totalAssigned > 0) ? `0 of ${totalAssigned} items` : "";
        return { value:val, hasData, partial, coverage };
      };

      // Flags — always computed from daily averages regardless of view toggle
      const getFlags = nutrients => {
        const daily = key => {
          const d = nutrients[key];
          return (d && d.itemsWithData > 0) ? d.total / 7 : null;
        };
        const flags = [];
        const cal    = daily("calories");
        const fiber  = daily("fiber");
        const sodium = daily("sodium");
        if (cal   !== null && cal   < 1000) flags.push({ key:"calories", label:"Low calories",  desc:`avg ${Math.round(cal)} kcal/day`,    dir:"low"  });
        if (fiber !== null && fiber < 14)   flags.push({ key:"fiber",    label:"Low fiber",     desc:`avg ${fiber.toFixed(1)}g/day`,        dir:"low"  });
        if (sodium !== null && sodium >= 2300) flags.push({ key:"sodium", label:"High sodium",  desc:`avg ${Math.round(sodium)} mg/day`,    dir:"high" });
        // Micronutrient completeness flag (blue-gray, shown when ≥ 3 of 6 micros have zero coverage)
        const microKeys = ["iron","calcium","potassium","vitC","vitD","folate"];
        const zeroMicros = microKeys.filter(k => !nutrients[k] || nutrients[k].itemsWithData === 0);
        if (zeroMicros.length >= 3) {
          flags.push({ key:"micro", label:"Incomplete micronutrient data",
            desc:`${zeroMicros.length} of 6 micronutrients not reported`, dir:"micro" });
        }
        return flags;
      };

      // Plan-level confidence summary line
      const getConfidence = (nutrients, assigned) => {
        const n = assigned.length;
        if (n === 0) return null;
        const microKeys = ["iron","calcium","potassium","vitC","vitD","folate"];
        const partial = microKeys
          .map(k => {
            const nut = STEP3_NUTRIENTS.find(x => x.key === k);
            const d   = nutrients[k];
            if (!d || !nut || d.itemsWithData === n) return null;
            return `${nut.label}: ${d.itemsWithData}/${n}`;
          })
          .filter(Boolean);
        if (partial.length === 0) return `${n} item${n!==1?"s":""} assigned · Full nutrient coverage`;
        const summary = partial.slice(0,3).join(", ") + (partial.length > 3 ? ` +${partial.length-3} more` : "");
        return `${n} item${n!==1?"s":""} assigned · Micronutrient coverage partial: ${summary}`;
      };

      // Items eligible for nutrient lookup: real USDA fdcId, assigned, not yet looked up, missing ≥1 micro
      const getLookupItems = (plan) => {
        const microNutrients = STEP3_NUTRIENTS.filter(n => n.group === "Micronutrients");
        return plan.items
          .filter(item => {
            if (!getUsed(plan.meals, item.id)) return false;
            if (!item.fdcId || item.nutrientsLookedUp) return false;
            if (String(item.fdcId).startsWith("manual_") || String(item.fdcId).startsWith("off_")) return false;
            return microNutrients.some(n => {
              const nut = (item.nutrients || []).find(nu => nu.nutrientName === n.name);
              return !nut || nut.value == null;
            });
          });
      };

      const handleLookup = async (planKey, itemId) => {
        setLookingUp(prev => new Set([...prev, itemId]));
        await lookupNutrients(planKey, itemId);
        setLookingUp(prev => { const s = new Set(prev); s.delete(itemId); return s; });
      };

      // ── Empty state ────────────────────────────────────────────────────
      if (!hasAnyData) {
        return (
          <div className="fade-up">
            <h2 style={{fontFamily:"'Lora',serif",fontSize:22,fontWeight:700,
              color:"var(--tx)",marginBottom:8}}>Nutritional Summary</h2>
            <div style={{background:"var(--card)",borderRadius:"var(--r)",padding:"48px 20px",
              textAlign:"center",color:"var(--mu)",border:"1px solid var(--bd)"}}>
              <div style={{fontSize:36,marginBottom:10}}>📊</div>
              <div style={{fontWeight:700,marginBottom:4,fontSize:15}}>No meals planned yet</div>
              <div style={{fontSize:13}}>Assign food items in Step 2 to see your nutritional summary.</div>
            </div>
          </div>
        );
      }

      // ── Main render ────────────────────────────────────────────────────
      const bothPlans = planData.length === 2;

      return (
        <div className="fade-up">
          {/* Header */}
          <div style={{display:"flex",justifyContent:"space-between",
            alignItems:"center",marginBottom:20}}>
            <div>
              <h2 style={{fontFamily:"'Lora',serif",fontSize:22,fontWeight:700,color:"var(--tx)"}}>
                Nutritional Summary
              </h2>
              <p style={{fontSize:13,color:"var(--mu)",marginTop:3}}>
                12 key nutrients · FDA daily values · only items assigned in your meal planner
              </p>
            </div>
            <div style={{display:"flex",gap:4,background:"#EDE7DC",borderRadius:9,padding:3}}>
              {[["daily","Daily Avg"],["weekly","Weekly Total"]].map(([v,l]) => (
                <button key={v} className="tab" onClick={() => setView(v)}
                  style={{background:view===v?"var(--card)":"transparent",
                    color:view===v?"var(--tx)":"var(--mu)",
                    boxShadow:view===v?"0 1px 4px rgba(24,10,0,.1)":"none"}}>
                  {l}
                </button>
              ))}
            </div>
          </div>

          {/* Plan cards */}
          <div style={{display:"grid",
            gridTemplateColumns: bothPlans ? "1fr 1fr" : "1fr",
            gap:20}}>

            {planData.map(({ planKey, plan, assigned, nutrients, totalSpent, budgetLimit }) => {
              const isThrifty   = planKey === "thrifty";
              const accentColor = isThrifty ? "var(--pri)" : "var(--sec)";
              const accentBg    = isThrifty ? "var(--pli)" : "var(--sli)";
              const planLabel   = isThrifty ? "🧾 Thrifty Plan" : "✨ Preferred Plan";
              const overBudget  = isThrifty && totalSpent > budgetLimit;
              const totalServings = assigned.reduce((s,it) => s + getUsed(plan.meals, it.id), 0);

              const flags      = getFlags(nutrients);
              const confidence = getConfidence(nutrients, assigned);
              const lookupItems = getLookupItems(plan);

              // % diff shown only on Preferred card when both plans have data
              const thriftyData = bothPlans ? planData.find(p => p.planKey === "thrifty") : null;
              const showDiff    = bothPlans && !isThrifty;

              return (
                <div key={planKey}
                  style={{background:"var(--card)",borderRadius:"var(--r)",
                    border:"1px solid var(--bd)",
                    boxShadow:"0 2px 12px rgba(24,10,0,.07)",overflow:"hidden"}}>

                  {/* Plan header */}
                  <div style={{background:accentBg,padding:"14px 18px",
                    borderBottom:"1px solid var(--bd)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{fontFamily:"'Lora',serif",fontSize:17,fontWeight:700,color:"var(--tx)"}}>
                        {planLabel}
                      </div>
                      <div style={{fontSize:13,fontWeight:700,
                        color:overBudget?"var(--warn)":accentColor}}>
                        {$$(totalSpent)}{budgetLimit ? ` / ${$$(budgetLimit)}` : " spent"}
                        {overBudget && " ⚠️"}
                      </div>
                    </div>
                    <div style={{fontSize:12,color:"var(--mu)",marginTop:4}}>
                      {assigned.length} item{assigned.length!==1?"s":""} · {totalServings} total servings planned
                    </div>
                  </div>

                  <div style={{padding:"14px 18px"}}>

                    {/* Confidence summary */}
                    {confidence && (
                      <div style={{fontSize:11,color:"var(--mu)",marginBottom:10,
                        background:"#F5F0E8",borderRadius:6,padding:"6px 10px",lineHeight:1.5}}>
                        📋 {confidence}
                      </div>
                    )}

                    {/* Flag banner */}
                    {flags.length > 0 && (
                      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
                        {flags.map(flag => (
                          <span key={flag.key} style={{
                            background: flag.dir==="micro" ? "#E8EEF7" : "var(--ali)",
                            color:      flag.dir==="micro" ? "#4A6FA5" : "var(--low)",
                            border:     `1px solid ${flag.dir==="micro" ? "#B0C4E0" : "#EDD8A0"}`,
                            borderRadius:6,padding:"4px 9px",fontSize:11,fontWeight:600}}>
                            {flag.dir==="micro" ? "ℹ" : "!"} {flag.label} — {flag.desc}
                          </span>
                        ))}
                      </div>
                    )}

                    {/* Nutrient groups */}
                    {[
                      { label:"Macronutrients", group:"Macronutrients" },
                      { label:"Micronutrients",  group:"Micronutrients" },
                    ].map(grp => {
                      const grpNutrients = STEP3_NUTRIENTS.filter(n => n.group === grp.group);
                      return (
                        <div key={grp.group} style={{marginBottom:16}}>
                          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",
                            letterSpacing:"1.2px",color:"var(--mu)",
                            paddingBottom:6,marginBottom:8,borderBottom:"1px solid var(--bd)"}}>
                            {grp.label}
                          </div>

                          {grpNutrients.map(n => {
                            const { value, hasData, partial, coverage } = getDisplay(nutrients, n.key);
                            const pct = hasData ? (value / n.rda) * 100 : 0;

                            // Inline row flag (amber)
                            const rowFlag = flags.find(f => f.key === n.key);

                            // % diff vs Thrifty (shown on Preferred card only)
                            let diffEl = null;
                            if (showDiff && thriftyData) {
                              const tDisp = getDisplay(thriftyData.nutrients, n.key);
                              if (hasData && tDisp.hasData && tDisp.value !== 0) {
                                const diffPct = Math.round(((value - tDisp.value) / tDisp.value) * 100);
                                const pos = diffPct >= 0;
                                diffEl = (
                                  <span style={{fontSize:10,fontWeight:600,marginLeft:4,
                                    color: pos ? "var(--sec)" : "var(--warn)"}}>
                                    {pos ? "+" : ""}{diffPct}% vs Thrifty
                                  </span>
                                );
                              }
                            }

                            // Bar color: amber for flagged, green for ≥80%, light gray otherwise
                            const barColor = !hasData  ? "var(--bd)" :
                              rowFlag               ? "var(--acc)" :
                              pct >= 80             ? "var(--sec)" : "#C8C0B4";

                            return (
                              <div key={n.key} style={{marginBottom:11}}>
                                {/* Label row */}
                                <div style={{display:"flex",justifyContent:"space-between",
                                  alignItems:"baseline",marginBottom:2,flexWrap:"wrap",gap:4}}>
                                  <span style={{fontSize:12,fontWeight:600,
                                    color:hasData?"var(--tx)":"var(--mu)"}}>
                                    {n.label}
                                  </span>
                                  <span style={{display:"flex",gap:4,alignItems:"baseline",
                                    flexWrap:"wrap",justifyContent:"flex-end"}}>
                                    {hasData ? (
                                      <>
                                        <span style={{fontFamily:"'Lora',serif",fontSize:13,
                                          fontWeight:700,color:"var(--tx)"}}>
                                          {partial && <span style={{color:"var(--acc)"}}>~</span>}
                                          {fmtVal(value)}
                                          <span style={{fontSize:10,fontWeight:400,
                                            color:"var(--mu)",marginLeft:1}}>{n.unit}</span>
                                        </span>
                                        <span style={{fontSize:10,color:"var(--mu)"}}>
                                          / {fmtVal(n.rda)}{n.unit}
                                        </span>
                                      </>
                                    ) : (
                                      <span style={{fontSize:11,color:"var(--mu)",fontStyle:"italic"}}>
                                        Not reported
                                      </span>
                                    )}
                                    {rowFlag && hasData && (
                                      <span style={{fontSize:10,background:"var(--ali)",
                                        color:"var(--low)",border:"1px solid #EDD8A0",
                                        borderRadius:4,padding:"1px 5px",fontWeight:600}}>
                                        {rowFlag.dir==="high" ? "↑ high" : "↓ low"}
                                      </span>
                                    )}
                                    {diffEl}
                                  </span>
                                </div>

                                {/* Progress bar */}
                                <div style={{height:5,borderRadius:3,background:"#EDE7DC",overflow:"hidden"}}>
                                  {hasData ? (
                                    <div style={{height:"100%",borderRadius:3,
                                      width:`${Math.min(pct,100)}%`,
                                      background:barColor,transition:"width .4s ease"}} />
                                  ) : (
                                    <div style={{height:"100%",borderRadius:3,width:"100%",
                                      background:"repeating-linear-gradient(90deg,#EDE7DC 0,#EDE7DC 5px,#DDD3C5 5px,#DDD3C5 10px)"}} />
                                  )}
                                </div>

                                {/* Sub-row: coverage note + % of goal */}
                                <div style={{display:"flex",justifyContent:"space-between",
                                  fontSize:10,color:"var(--mu)",marginTop:2}}>
                                  <span>
                                    {partial && (
                                      <span style={{color:"#C07A00"}}>~ based on {coverage}</span>
                                    )}
                                    {!hasData && coverage && (
                                      <span>Not reported by any assigned item</span>
                                    )}
                                  </span>
                                  <span>
                                    {hasData && `${Math.round(pct)}% of ${view==="weekly"?"weekly":"daily"} goal`}
                                  </span>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      );
                    })}

                    {/* Nutrient lookup section */}
                    {lookupItems.length > 0 && (
                      <div style={{background:"#F5F0E8",borderRadius:8,
                        padding:"10px 12px",marginTop:4,marginBottom:4}}>
                        <div style={{fontSize:11,fontWeight:700,color:"var(--mu)",marginBottom:4}}>
                          ↻ Fetch missing micronutrients
                        </div>
                        <div style={{fontSize:11,color:"var(--mu)",marginBottom:8,lineHeight:1.5}}>
                          These items have full USDA data available but haven't fetched micronutrients yet.
                        </div>
                        {lookupItems.map(item => (
                          <div key={item.id}
                            style={{display:"flex",justifyContent:"space-between",
                              alignItems:"center",marginBottom:5,gap:8}}>
                            <span style={{fontSize:12,color:"var(--tx)",fontWeight:500,
                              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                              {item.name.split(",")[0].substring(0,34)}
                              {item.name.split(",")[0].length > 34 ? "…" : ""}
                            </span>
                            <button className="btn"
                              onClick={() => handleLookup(planKey, item.id)}
                              disabled={lookingUp.has(item.id)}
                              style={{flexShrink:0,
                                background:lookingUp.has(item.id)?"var(--bd)":"white",
                                color:lookingUp.has(item.id)?"var(--mu)":"var(--pri)",
                                border:"1px solid var(--bd)",
                                padding:"3px 10px",fontSize:11,fontWeight:600}}>
                              {lookingUp.has(item.id) ? "Fetching…" : "↻ Look up"}
                            </button>
                          </div>
                        ))}
                      </div>
                    )}

                  </div>
                </div>
              );
            })}
          </div>

          {/* Disclaimer */}
          <div style={{marginTop:16,fontSize:11,color:"var(--mu)",
            textAlign:"center",lineHeight:1.7}}>
            RDA benchmarks: FDA Daily Values for a 2,000 kcal diet ·
            Nutrient totals reflect only items assigned in the Meal Planner ·
            ~ indicates partial coverage (some items did not report this nutrient) ·
            "Not reported" means no assigned item provided this value
          </div>
        </div>
      );
    }

    /* ── App ────────────────────────────────────────────────────────────── */
    function App() {
      const saved = loadSaved();

      const [screen,     setScreen]     = useState("plan-select");
      const [activePlan, setActivePlan] = useState("thrifty");
      const [sex,        setSex]        = useState("male");
      const [activeStep, setActiveStep] = useState(1);
      const [plans,      setPlans]      = useState(saved || {
        thrifty:   { items: [], meals: initMeals() },
        preferred: { items: [], meals: initMeals() },
      });

      // Step 1 state
      const [searchQuery,   setSearchQuery]   = useState("");
      const [searchResults, setSearchResults] = useState([]);
      const [searching,     setSearching]     = useState(false);
      const [showDropdown,  setShowDropdown]  = useState(false);
      const [selectedFood,  setSelectedFood]  = useState(null);
      const [qty,   setQty]   = useState("");
      const [unit,  setUnit]  = useState("oz");
      const [price, setPrice] = useState("");
      const debRef = useRef(null);

      // Step 2 state
      const [selectedSlot,   setSelectedSlot]   = useState(null);
      const [pickerItemId,   setPickerItemId]   = useState("");
      const [pickerServings, setPickerServings] = useState(1);
      const [showReset,      setShowReset]      = useState(false);
      const [showExport,     setShowExport]     = useState(false);

      // Persist to localStorage on every plans change
      useEffect(() => {
        try { localStorage.setItem("fcp_plans", JSON.stringify(plans)); } catch(e) {}
      }, [plans]);

      // Derived
      const cur         = plans[activePlan];
      const budgetLimit = activePlan === "thrifty" ? BUDGET[sex] : null;
      const totalSpent  = cur.items.reduce((s, i) => s + i.price, 0);
      const overBudget  = activePlan === "thrifty" && totalSpent > budgetLimit;
      const hasSaved    = !!(saved && (saved.thrifty.items.length > 0 || saved.preferred.items.length > 0));

      // Ranked USDA + Open Food Facts search
      useEffect(() => {
        const query = searchQuery.trim();
        if (!query || query.length < 2) {
          setSearchResults([]); setShowDropdown(false); return;
        }

        clearTimeout(debRef.current);
        debRef.current = setTimeout(async () => {
          setSearching(true);
          try {
            const [usdaRes, offRes] = await Promise.all([
              // pageSize=20 ensures enough results to find 4 quality items per USDA tier after partitioning.
              fetch(`https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(query)}&pageSize=20&api_key=${USDA_KEY}`),
              fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=8&fields=id,code,product_name,product_name_en,brands,serving_size,serving_quantity,nutriments`),
            ]);
            const [usdaData, offData] = await Promise.all([usdaRes.json(), offRes.json()]);

            // Score a food item for ordering within its tier (preserves existing quality signals).
            const scoreFood = (food) => {
              const name  = food.description || "";
              const brand = food.brandName || food.brandOwner || "";
              let score   = scoreMatch(query, name);
              if (brand) score += Math.min(16, scoreMatch(query, brand) * 0.2);
              if (isCommonFood(name)) score += 10;
              if ((food.foodNutrients || food.nutrients || []).length >= 4) score += 6;
              if ((food.servingSize || 0) > 0) score += 4;
              return score;
            };

            // Partition USDA results by tier, score within each tier, take top 4.
            // Foundation + SR Legacy = "generic" — lab-analyzed, full nutrient profile (40+ nutrients).
            // Branded Food          = "branded" — exact label data, spottier micronutrients.
            // Survey (FNDDS) and others are dropped — not useful in this context.
            const allUsda = (usdaData.foods || []).map(normalizeUSDAFood);
            const genericFoods = allUsda
              .filter(f => f.dataType === "Foundation" || f.dataType === "SR Legacy")
              .map(f => ({ ...f, tier: "generic", _score: scoreFood(f) }))
              .sort((a, b) => b._score - a._score)
              .slice(0, 4);
            const brandedFoods = allUsda
              .filter(f => f.dataType === "Branded Food")
              .map(f => ({ ...f, tier: "branded", _score: scoreFood(f) }))
              .sort((a, b) => b._score - a._score)
              .slice(0, 4);

            const offFoods = (offData.products || [])
              .filter(filterOFFProduct)
              .map(p => ({ ...normalizeOFF(p), tier: "off", _score: scoreFood(normalizeOFF(p)) }))
              .sort((a, b) => b._score - a._score)
              .slice(0, 4);

            // Merge in tier order: generic first (best nutrient data), branded second, OFF third.
            // Dedup across tiers in case the same item appears in multiple sources.
            const merged = dedupeFoods([...genericFoods, ...brandedFoods, ...offFoods]);
            setSearchResults(merged);
            setShowDropdown(merged.length > 0);
          } catch(e) {
            console.error("Search error:", e);
            setSearchResults([]);
            setShowDropdown(false);
          } finally { setSearching(false); }
        }, 420);

        return () => clearTimeout(debRef.current);
      }, [searchQuery]);

      const selectFood = async food => {
        setSelectedFood(food);
        if (food) setSearchQuery(food.description);
        setShowDropdown(false);
        // For USDA items, fetch the full food detail to get the complete nutrient profile
        // (the search endpoint only returns a subset; the detail endpoint has all 40+ nutrients)
        if (food && food.source !== "off" && food.fdcId && !String(food.fdcId).startsWith("off_")) {
          try {
            const res  = await fetch(`https://api.nal.usda.gov/fdc/v1/food/${food.fdcId}?api_key=${USDA_KEY}`);
            const detail = await res.json();
            // Detail endpoint format: { nutrient: { name, unitName }, amount }
            // Search endpoint format: { nutrientName, value, unitName }
            // Normalize to the search format so the rest of the tool is consistent
            const fullNutrients = (detail.foodNutrients || [])
              .map(fn => ({
                nutrientName: fn.nutrient?.name || fn.nutrientName,
                value:        fn.amount ?? fn.value,
                unitName:     fn.nutrient?.unitName || fn.unitName,
              }))
              .filter(n => n.nutrientName && n.value != null);
            if (fullNutrients.length > 0) {
              setSelectedFood(prev =>
                prev?.fdcId === food.fdcId
                  ? { ...prev, foodNutrients: fullNutrients }
                  : prev
              );
            }
          } catch(e) { /* silently fall back to search-result nutrients */ }
        }
      };

      // ── Manual food entry ────────────────────────────────────────────────
      // Accepts fields from the manual-entry form in Step1.
      // dataType "Branded Food" tells getNutrientPerServing that values are
      // already per-serving (students read them off the nutrition label),
      // so no ×(servingSize/100) scaling is applied — exactly like USDA branded items.
      const addManualItem = ({ name, brand, url, servingSize, servingsPerContainer,
                               calories, protein, fat, carbs, fiber, sodium,
                               qty, unit, price }) => {
        // Build nutrient array using USDA nutrientName strings so the existing
        // getNutrientPerServing / calcWeeklyNutrients logic requires zero changes.
        const nutrients = [
          calories !== "" ? { nutrientName:"Energy",                       value:parseFloat(calories), unitName:"kcal" } : null,
          protein  !== "" ? { nutrientName:"Protein",                      value:parseFloat(protein),  unitName:"g"   } : null,
          fat      !== "" ? { nutrientName:"Total lipid (fat)",            value:parseFloat(fat),      unitName:"g"   } : null,
          carbs    !== "" ? { nutrientName:"Carbohydrate, by difference",  value:parseFloat(carbs),    unitName:"g"   } : null,
          fiber    !== "" ? { nutrientName:"Fiber, total dietary",         value:parseFloat(fiber),    unitName:"g"   } : null,
          sodium   !== "" ? { nutrientName:"Sodium, Na",                   value:parseFloat(sodium),   unitName:"mg"  } : null,
        ].filter(n => n && !isNaN(n.value));

        // Temporary food-shape object for calcServings — only needs servingSize and
        // servingsPerContainer; the rest of the stored item is built below.
        const foodObj = {
          servingSize:          parseFloat(servingSize),
          servingSizeUnit:      "g",
          // When unit is "each", servingsPerContainer is required (enforced in the form).
          // For weight units it may be null; calcServings falls back to gram math.
          servingsPerContainer: servingsPerContainer !== "" ? parseFloat(servingsPerContainer) : null,
          dataType:             "Branded Food",
        };
        const servings = calcServings(foodObj, parseFloat(qty), unit);
        const p = parseFloat(price);
        setPlans(prev => ({
          ...prev,
          [activePlan]: {
            ...prev[activePlan],
            items: [...prev[activePlan].items, {
              id:               Date.now().toString(),
              fdcId:            "manual_" + Date.now(),
              name:             name.trim(),
              brandName:        brand.trim() || "",
              sourceUrl:        url.trim()   || "", // stored for student reference; never fetched
              purchasedQty:     parseFloat(qty),
              purchasedUnit:    unit,
              price:            p,
              servingSize:      foodObj.servingSize,
              servingSizeUnit:  "g",
              servingsPerContainer: foodObj.servingsPerContainer,
              totalServings:    servings,
              costPerServing:   p / servings,
              dataType:         "Branded Food",
              source:           "manual",
              nutrients,
            }],
          },
        }));
      };

      const addToList = () => {
        if (!selectedFood || !parseFloat(qty) || !parseFloat(price)) return;
        const servings = calcServings(selectedFood, parseFloat(qty), unit);
        setPlans(p => ({
          ...p,
          [activePlan]: {
            ...p[activePlan],
            items: [...p[activePlan].items, {
              id:              Date.now().toString(),
              fdcId:           selectedFood.fdcId,
              name:            selectedFood.description,
              brandName:       selectedFood.brandName || selectedFood.brandOwner || "",
              purchasedQty:    parseFloat(qty),
              purchasedUnit:   unit,
              price:           parseFloat(price),
              servingSize:     selectedFood.servingSize || 100,
              servingSizeUnit: selectedFood.servingSizeUnit || "g",
              totalServings:   servings,
              costPerServing:  parseFloat(price) / servings,
              nutrients:       selectedFood.foodNutrients || [],
            }],
          },
        }));
        setSelectedFood(null); setSearchQuery(""); setQty(""); setPrice("");
      };

      const removeItem = id => {
        setPlans(p => {
          const nm = JSON.parse(JSON.stringify(p[activePlan].meals));
          DAYS.forEach(d => MEALS.forEach(m => {
            nm[d][m] = (nm[d][m] || []).filter(e => e.itemId !== id);
          }));
          return { ...p, [activePlan]: { items: p[activePlan].items.filter(i => i.id !== id), meals: nm } };
        });
      };

      const assignMeal = () => {
        if (!selectedSlot || !pickerItemId || pickerServings <= 0) return;
        const item = cur.items.find(i => i.id === pickerItemId);
        if (!item) return;
        const used = getUsed(cur.meals, pickerItemId);
        if (pickerServings > item.totalServings - used) return;
        setPlans(p => {
          const nm   = JSON.parse(JSON.stringify(p[activePlan].meals));
          const slot = nm[selectedSlot.day][selectedSlot.meal];
          const ex   = slot.find(e => e.itemId === pickerItemId);
          if (ex) ex.servings += pickerServings; else slot.push({ itemId: pickerItemId, servings: pickerServings });
          return { ...p, [activePlan]: { ...p[activePlan], meals: nm } };
        });
        setSelectedSlot(null); setPickerItemId(""); setPickerServings(1);
      };

      const removeFromSlot = (day, meal, itemId) => {
        setPlans(p => {
          const nm = JSON.parse(JSON.stringify(p[activePlan].meals));
          nm[day][meal] = nm[day][meal].filter(e => e.itemId !== itemId);
          return { ...p, [activePlan]: { ...p[activePlan], meals: nm } };
        });
      };

      // ── Nutrient lookup from Step 3 ──────────────────────────────────────
      // Re-fetches full nutrient detail for a USDA item that was added without
      // complete micronutrient data. Silently updates localStorage in place.
      // Only works for items with a real USDA fdcId (not manual_ or off_ items).
      const lookupNutrients = async (planKey, itemId) => {
        const item = plans[planKey]?.items.find(i => i.id === itemId);
        if (!item?.fdcId || String(item.fdcId).startsWith("manual_") || String(item.fdcId).startsWith("off_")) return;
        try {
          const res    = await fetch(`https://api.nal.usda.gov/fdc/v1/food/${item.fdcId}?api_key=${USDA_KEY}`);
          const detail = await res.json();
          const fullNutrients = (detail.foodNutrients || [])
            .map(fn => ({
              nutrientName: fn.nutrient?.name || fn.nutrientName,
              value:        fn.amount ?? fn.value,
              unitName:     fn.nutrient?.unitName || fn.unitName,
            }))
            .filter(n => n.nutrientName && n.value != null);
          if (fullNutrients.length > 0) {
            setPlans(prev => ({
              ...prev,
              [planKey]: {
                ...prev[planKey],
                items: prev[planKey].items.map(i =>
                  // nutrientsLookedUp flag removes item from the lookup section even if
                  // some micronutrients are genuinely absent from USDA's own data.
                  i.id === itemId ? { ...i, nutrients: fullNutrients, nutrientsLookedUp: true } : i
                ),
              },
            }));
          }
        } catch(e) { /* silent fail — student can retry */ }
      };

      const resetPlan = which => {
        const blank = () => ({ items: [], meals: initMeals() });
        setPlans(p => ({
          thrifty:   which === "preferred" ? p.thrifty   : blank(),
          preferred: which === "thrifty"   ? p.preferred : blank(),
        }));
        setShowReset(false);
      };

      const downloadCSV = () => {
        const sections = [
          ["THRIFTY PLAN - SHOPPING LIST"],
          ...buildShoppingRows(plans.thrifty.items),
          [],
          ["PREFERRED PLAN - SHOPPING LIST"],
          ...buildShoppingRows(plans.preferred.items),
          [],
          ["THRIFTY PLAN - MEAL PLANNER"],
          ...buildMealRows(plans.thrifty.items, plans.thrifty.meals),
          [],
          ["PREFERRED PLAN - MEAL PLANNER"],
          ...buildMealRows(plans.preferred.items, plans.preferred.meals),
          [],
          ["NUTRITIONAL SUMMARY (Daily Averages vs FDA Daily Values)"],
          ...buildNutritionRows(plans),
        ];
        const csv  = sections.map(r => Array.isArray(r) ? rowToCSV(r) : "").join("\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const a    = document.createElement("a");
        a.href     = URL.createObjectURL(blob);
        a.download = "food-consumption-project.csv";
        a.click();
        setShowExport(false);
      };

      const downloadXLSX = () => {
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb,
          XLSX.utils.aoa_to_sheet(buildShoppingRows(plans.thrifty.items)),   "Thrifty - Shopping");
        XLSX.utils.book_append_sheet(wb,
          XLSX.utils.aoa_to_sheet(buildShoppingRows(plans.preferred.items)), "Preferred - Shopping");
        XLSX.utils.book_append_sheet(wb,
          XLSX.utils.aoa_to_sheet(buildMealRows(plans.thrifty.items,   plans.thrifty.meals)),   "Thrifty - Meals");
        XLSX.utils.book_append_sheet(wb,
          XLSX.utils.aoa_to_sheet(buildMealRows(plans.preferred.items, plans.preferred.meals)), "Preferred - Meals");
        XLSX.utils.book_append_sheet(wb,
          XLSX.utils.aoa_to_sheet(buildNutritionRows(plans)), "Nutrition Summary");
        XLSX.writeFile(wb, "food-consumption-project.xlsx");
        setShowExport(false);
      };

      // Screen routing
      if (screen === "plan-select") return (
        <PlanSelect hasSaved={hasSaved} onSelect={plan => {
          setActivePlan(plan);
          setScreen(plan === "thrifty" ? "budget-setup" : "main");
        }} />
      );
      if (screen === "budget-setup") return (
        <BudgetSetup sex={sex} setSex={setSex} onConfirm={() => setScreen("main")} />
      );

      return (
        <div style={{minHeight:"100vh",background:"var(--bg)"}}>
          <Header
            activePlan={activePlan} activeStep={activeStep} setActiveStep={setActiveStep}
            totalSpent={totalSpent} budgetLimit={budgetLimit} overBudget={overBudget}
            onSwitch={() => { setScreen("plan-select"); setActiveStep(1); }}
            onReset={() => setShowReset(true)}
            onExport={() => setShowExport(true)}
          />
          <div style={{maxWidth:1200,margin:"0 auto",padding:"20px 16px"}}>
            {activeStep === 1 && (
              <Step1
                activePlan={activePlan} items={cur.items}
                totalSpent={totalSpent} budgetLimit={budgetLimit} overBudget={overBudget}
                goToStep2={() => setActiveStep(2)}
                searchQuery={searchQuery}   setSearchQuery={setSearchQuery}
                searchResults={searchResults} searching={searching}
                showDropdown={showDropdown}  setShowDropdown={setShowDropdown}
                selectedFood={selectedFood}  setSelectedFood={setSelectedFood} selectFood={selectFood}
                qty={qty} setQty={setQty} unit={unit} setUnit={setUnit}
                price={price} setPrice={setPrice}
                addToList={addToList} removeItem={removeItem}
                addManualItem={addManualItem}
              />
            )}
            {activeStep === 2 && (
              <Step2
                items={cur.items} meals={cur.meals}
                selectedSlot={selectedSlot}     setSelectedSlot={setSelectedSlot}
                pickerItemId={pickerItemId}     setPickerItemId={setPickerItemId}
                pickerServings={pickerServings} setPickerServings={setPickerServings}
                assignMeal={assignMeal} removeFromSlot={removeFromSlot}
              />
            )}
            {activeStep === 3 && (
              <Step3 plans={plans} sex={sex} lookupNutrients={lookupNutrients} />
            )}
          </div>

          {/* ── Reset Modal ── */}
          {showReset && (
            <div onClick={() => setShowReset(false)}
              style={{position:"fixed",inset:0,background:"rgba(24,10,0,.5)",
                zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
              <div className="pop-in" onClick={e => e.stopPropagation()}
                style={{background:"var(--card)",borderRadius:14,padding:28,maxWidth:380,
                  width:"100%",boxShadow:"0 8px 40px rgba(24,10,0,.2)"}}>
                <div style={{fontSize:32,marginBottom:12,textAlign:"center"}}>↺</div>
                <h3 style={{fontFamily:"'Lora',serif",fontSize:19,fontWeight:700,
                  color:"var(--tx)",textAlign:"center",marginBottom:8}}>Reset Plan Data</h3>
                <p style={{fontSize:13,color:"var(--mu)",lineHeight:1.65,textAlign:"center",marginBottom:20}}>
                  This permanently deletes your shopping list and meal assignments.
                  Choose which plan to reset — this cannot be undone.
                </p>
                <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
                  {[
                    { label:"Reset Thrifty Plan only",   which:"thrifty",   bg:"var(--wbg)", c:"var(--warn)" },
                    { label:"Reset Preferred Plan only",  which:"preferred", bg:"var(--wbg)", c:"var(--warn)" },
                    { label:"Reset Both Plans",           which:"both",      bg:"var(--warn)",c:"white"       },
                  ].map(opt => (
                    <button key={opt.which} className="btn" onClick={() => resetPlan(opt.which)}
                      style={{background:opt.bg,color:opt.c,padding:"10px 0",
                        fontSize:13,border:`1px solid ${opt.which==="both"?"var(--warn)":"#F0B8A8"}`}}>
                      {opt.label}
                    </button>
                  ))}
                </div>
                <button className="btn" onClick={() => setShowReset(false)}
                  style={{background:"var(--bd)",color:"var(--mu)",padding:"9px 0",
                    fontSize:13,width:"100%"}}>
                  Cancel
                </button>
              </div>
            </div>
          )}

          {/* ── Export Modal ── */}
          {showExport && (
            <div onClick={() => setShowExport(false)}
              style={{position:"fixed",inset:0,background:"rgba(24,10,0,.5)",
                zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
              <div className="pop-in" onClick={e => e.stopPropagation()}
                style={{background:"var(--card)",borderRadius:14,padding:28,maxWidth:400,
                  width:"100%",boxShadow:"0 8px 40px rgba(24,10,0,.2)"}}>
                <div style={{fontSize:32,marginBottom:12,textAlign:"center"}}>⬇</div>
                <h3 style={{fontFamily:"'Lora',serif",fontSize:19,fontWeight:700,
                  color:"var(--tx)",textAlign:"center",marginBottom:8}}>Export Your Data</h3>
                <p style={{fontSize:13,color:"var(--mu)",lineHeight:1.65,textAlign:"center",marginBottom:6}}>
                  Downloads both plans in one file with five sheets:
                </p>
                <ul style={{fontSize:12,color:"var(--mu)",marginBottom:20,
                  paddingLeft:20,lineHeight:2}}>
                  <li>Thrifty Plan — Shopping List</li>
                  <li>Preferred Plan — Shopping List</li>
                  <li>Thrifty Plan — Meal Planner</li>
                  <li>Preferred Plan — Meal Planner</li>
                  <li>Nutritional Summary (both plans)</li>
                </ul>
                <div style={{display:"flex",gap:10,marginBottom:12}}>
                  <button className="btn" onClick={downloadXLSX}
                    style={{flex:1,background:"var(--sec)",color:"white",
                      padding:"12px 0",fontSize:14}}>
                    ⬇ Excel (.xlsx)
                  </button>
                  <button className="btn" onClick={downloadCSV}
                    style={{flex:1,background:"var(--sli)",color:"var(--sec)",
                      padding:"12px 0",fontSize:14,border:"1px solid #AACDB8"}}>
                    ⬇ CSV
                  </button>
                </div>
                <div style={{fontSize:11,color:"var(--mu)",textAlign:"center",marginBottom:14,lineHeight:1.5}}>
                  Excel is recommended — multiple sheets, opens directly in Excel or Google Sheets.<br/>
                  CSV is a single file with all sections stacked, separated by blank rows.
                </div>
                <button className="btn" onClick={() => setShowExport(false)}
                  style={{background:"var(--bd)",color:"var(--mu)",padding:"9px 0",
                    fontSize:13,width:"100%"}}>
                  Cancel
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
